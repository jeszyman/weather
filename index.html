<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hourly UV — Olivette</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 780px; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.25rem; }
    #chart svg { border: 1px solid #eee; border-radius: 6px; }
    .err { color: #b00; padding: 1rem; border: 1px solid #f3c; border-radius: 6px; }
    .sub { color: #666; font-size: 0.85rem; }
    table { border-collapse: collapse; font-size: 0.85rem; width: 100%; }
    th, td { border: 1px solid #eee; padding: 2px 8px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    #locbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    #locbar select, #locbar input, #locbar button { font-size: 0.9rem; padding: 4px 8px; }
    #picks { flex-basis: 100%; }
    #picks button { display: block; width: 100%; text-align: left; padding: 6px 8px; margin: 2px 0; border: 1px solid #ddd; background: #fafafa; cursor: pointer; }
    #picks button:hover { background: #eef; }
    #picks .msg { color: #666; font-size: 0.85rem; padding: 4px 0; }
    #matrix-wrap { overflow-x: auto; margin-bottom: 1.5rem; }
    table.matrix { border-collapse: collapse; font-size: 0.8rem; width: auto; }
    table.matrix th, table.matrix td { border: 1px solid #eee; width: 22px; height: 22px; text-align: center; padding: 0; }
    table.matrix th.rowlabel { position: sticky; left: 0; background: #fff; text-align: left; padding: 0 8px; white-space: nowrap; width: auto; z-index: 1; }
    table.matrix td.go { background: #c8e6c9; }
    table.matrix td.caution { background: #ffe082; }
    table.matrix td.nogo { background: #ef9a9a; }
    table.matrix td.night { box-shadow: inset 0 0 0 99px rgba(30,30,60,0.28); }
    .matrix-legend { font-size: 0.8rem; display: flex; gap: 0.75rem; margin-bottom: 0.4rem; align-items: center; }
    #alerts { margin-bottom: 1rem; }
    .alerts { display: flex; flex-direction: column; gap: 4px; }
    .alert-row { display: flex; justify-content: space-between; gap: 1rem; padding: 6px 10px; border-radius: 4px; font-size: 0.9rem; }
    .alert-row.sev-high { background: #ef9a9a; }
    .alert-row.sev-mid { background: #ffe082; }
    .alert-row.sev-low { background: #e0e0e0; }
    .alert-ev { font-weight: 600; }
    .alert-win { color: #444; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="locbar">
    <select id="locsel" aria-label="Saved locations"></select>
    <input id="locq" type="text" placeholder="Search city…" aria-label="Search city">
    <button id="locsearch">Search</button>
    <button id="locremove" title="Remove current location">✕</button>
    <div id="picks"></div>
  </div>
  <div id="alerts"></div>
  <h2 id="h-matrix" data-metric="Conditions" style="font-size:1.1rem;">Conditions</h2>
  <div class="matrix-legend">
    <span><b>·</b> go</span> <span><b>–</b> caution</span> <span><b>✕</b> no-go</span>
    <span class="sub">shaded = night</span>
  </div>
  <div id="matrix-wrap"><div id="matrix">Loading…</div></div>
  <h1 id="h-uv" data-metric="Hourly UV Index">Hourly UV Index</h1>
  <p class="sub">Solid = forecast UV, dashed = clear-sky. Source: Open-Meteo.</p>
  <div id="chart">Loading…</div>

  <h2 id="h-temp" data-metric="Temperature" style="font-size:1.1rem;margin-top:2rem;">Temperature</h2>
  <div id="temp">Loading…</div>
  <h2 id="h-precip" data-metric="Precipitation" style="font-size:1.1rem;margin-top:1.5rem;">Precipitation</h2>
  <p class="sub">Bars = chance of rain (%), line = hourly amount (in).</p>
  <div id="precip">Loading…</div>
  <h2 style="font-size:1.1rem;margin-top:1.5rem;">Hourly detail</h2>
  <div id="wtable">Loading…</div>
  <script type="module">
    import { filterToday, buildSvg, locationToday, todayIndices, buildTempSvg, buildPrecipSvg, buildWeatherTable,
             parseGeocode, addLocation, removeLocation, sameLoc, validateState, seedState, buildMatrix,
             parseAlerts, convectiveHours, renderAlertBanner } from './uv-core.js';

    const LS_KEY = 'weather.locations.v1';
    let mem = null; // in-memory fallback when localStorage throws
    const store = {
      load() {
        try { return validateState(localStorage.getItem(LS_KEY)); }
        catch (_) { return mem ? validateState(JSON.stringify(mem)) : seedState(); }
      },
      save(state) {
        mem = state;
        try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (_) { /* in-memory only */ }
      },
    };

    let state = store.load();
    const active = () => state.locations[state.activeIdx];

    function setText(el, str) { el.textContent = str; }

    let renderToken = 0;

    async function fetchUV(lat, lon) {
      const url = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=uv_index,uv_index_clear_sky&timezone=auto`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const j = await res.json();
      if (!j.hourly || !Array.isArray(j.hourly.time) || typeof j.utc_offset_seconds !== 'number') throw new Error('malformed response');
      return j;
    }

    async function fetchForecast(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,precipitation&temperature_unit=fahrenheit&precipitation_unit=inch&timezone=auto`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const j = await res.json();
      const h = j.hourly;
      const ok = h && Array.isArray(h.time) && Array.isArray(h.temperature_2m) &&
        Array.isArray(h.precipitation_probability) && Array.isArray(h.precipitation) &&
        h.temperature_2m.length === h.time.length &&
        h.precipitation_probability.length === h.time.length &&
        h.precipitation.length === h.time.length &&
        typeof j.utc_offset_seconds === 'number';
      if (!ok) throw new Error('malformed response');
      return j;
    }

    async function fetchMatrix(lat, lon) {
      const aqURL = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=uv_index,us_aqi&timezone=auto`;
      const fcURL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=cape,weather_code,wind_gusts_10m,apparent_temperature,precipitation,is_day&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;
      const alURL = `https://api.weather.gov/alerts/active?point=${lat},${lon}`;
      const [aqRes, fcRes, alJson] = await Promise.all([
        fetch(aqURL),
        fetch(fcURL),
        fetch(alURL).then((r) => (r.ok ? r.json() : null)).catch(() => null), // NON-FATAL
      ]);
      if (!aqRes.ok || !fcRes.ok) throw new Error(`HTTP ${aqRes.status}/${fcRes.status}`);
      const [aq, fc] = await Promise.all([aqRes.json(), fcRes.json()]);
      if (!aq.hourly || !Array.isArray(aq.hourly.time) || typeof aq.utc_offset_seconds !== 'number') throw new Error('malformed air-quality');
      if (!fc.hourly || !Array.isArray(fc.hourly.time) || typeof fc.utc_offset_seconds !== 'number') throw new Error('malformed forecast');
      const aqOk = ['uv_index', 'us_aqi'].every((k) =>
        Array.isArray(aq.hourly[k]) && aq.hourly[k].length === aq.hourly.time.length);
      const fcOk = ['cape', 'weather_code', 'wind_gusts_10m', 'apparent_temperature', 'precipitation', 'is_day'].every((k) =>
        Array.isArray(fc.hourly[k]) && fc.hourly[k].length === fc.hourly.time.length);
      if (!aqOk || !fcOk) throw new Error('malformed matrix data');
      return { aq, fc, alerts: parseAlerts(alJson || {}) };
    }

    async function renderMatrix(loc, token) {
      const el = document.getElementById('matrix');
      try {
        const { aq, fc, alerts } = await fetchMatrix(loc.lat, loc.lon);
        if (token !== renderToken) return;
        const offset = fc.utc_offset_seconds;
        const todayStr = locationToday(Date.now(), offset);
        const warnHours = convectiveHours(alerts, todayStr, offset);
        const alertsEl = document.getElementById('alerts');
        alertsEl.innerHTML = renderAlertBanner(alerts); // safe: renderAlertBanner escapes all dynamic text
        const aqIdx = todayIndices(aq.hourly.time, locationToday(Date.now(), aq.utc_offset_seconds));
        const fcIdx = todayIndices(fc.hourly.time, locationToday(Date.now(), fc.utc_offset_seconds));
        // Align by hour-of-day: build a lookup from the forecast slice keyed by HH.
        const hh = (iso) => iso.slice(11, 13);
        const fcByHour = {};
        for (const i of fcIdx) fcByHour[hh(fc.hourly.time[i])] = i;
        const hours = [];
        for (const i of aqIdx) {
          const key = hh(aq.hourly.time[i]);
          const fi = fcByHour[key];
          if (fi === undefined) continue;
          const candidate = {
            hour: Number(key),
            isDay: fc.hourly.is_day[fi],
            uv: aq.hourly.uv_index[i],
            aqi: aq.hourly.us_aqi[i],
            code: fc.hourly.weather_code[fi],
            cape: fc.hourly.cape[fi],
            gust: fc.hourly.wind_gusts_10m[fi],
            appT: fc.hourly.apparent_temperature[fi],
            precip: fc.hourly.precipitation[fi],
            stormWarning: warnHours.has(key),
          };
          const numeric = [candidate.isDay, candidate.uv, candidate.aqi, candidate.code,
            candidate.cape, candidate.gust, candidate.appT, candidate.precip];
          if (!numeric.every(Number.isFinite)) continue;
          hours.push(candidate);
        }
        if (!hours.length) { el.textContent = 'No conditions data for today yet.'; return; }
        el.innerHTML = buildMatrix(hours);
      } catch (e) {
        if (token !== renderToken) return;
        console.error(e);
        el.innerHTML = `<div class="err">Couldn't load conditions — try again later.</div>`;
        const a = document.getElementById('alerts');
        if (a) a.innerHTML = '';
      }
    }

    async function renderUV(loc, token) {
      const el = document.getElementById('chart');
      try {
        const j = await fetchUV(loc.lat, loc.lon);
        if (token !== renderToken) return;
        const pts = filterToday(j.hourly.time, j.hourly.uv_index, j.hourly.uv_index_clear_sky, locationToday(Date.now(), j.utc_offset_seconds));
        el.innerHTML = pts.length ? buildSvg(pts) : '';
        if (!pts.length) el.textContent = 'No UV data for today yet.';
      } catch (e) {
        if (token !== renderToken) return;
        console.error(e);
        el.innerHTML = `<div class="err">Couldn't load UV data — try again later.</div>`;
      }
    }

    async function renderForecast(loc, token) {
      const tEl = document.getElementById('temp');
      const pEl = document.getElementById('precip');
      const wEl = document.getElementById('wtable');
      try {
        const j = await fetchForecast(loc.lat, loc.lon);
        if (token !== renderToken) return;
        const h = j.hourly;
        const idx = todayIndices(h.time, locationToday(Date.now(), j.utc_offset_seconds));
        if (!idx.length) { tEl.textContent = pEl.textContent = wEl.textContent = 'No forecast for today yet.'; return; }
        const temp = idx.map((i) => ({ time: h.time[i], temp: h.temperature_2m[i] }));
        const precip = idx.map((i) => ({ time: h.time[i], prob: h.precipitation_probability[i], amount: h.precipitation[i] }));
        const all = idx.map((i) => ({ time: h.time[i], temp: h.temperature_2m[i], prob: h.precipitation_probability[i], amount: h.precipitation[i] }));
        tEl.innerHTML = buildTempSvg(temp);
        pEl.innerHTML = buildPrecipSvg(precip);
        wEl.innerHTML = buildWeatherTable(all);
      } catch (e) {
        if (token !== renderToken) return;
        console.error(e);
        tEl.innerHTML = `<div class="err">Couldn't load forecast — try again later.</div>`;
        pEl.innerHTML = ''; wEl.innerHTML = '';
      }
    }

    function updateHeadings(loc) {
      for (const id of ['h-matrix', 'h-uv', 'h-temp', 'h-precip']) {
        const el = document.getElementById(id);
        if (el) setText(el, `${el.dataset.metric} — ${loc.name}`);
      }
      document.title = `Weather — ${loc.name}`;
    }

    function renderAll() {
      const token = ++renderToken;
      const loc = active();
      updateHeadings(loc);
      renderMatrix(loc, token);
      renderUV(loc, token);
      renderForecast(loc, token);
    }

    const selEl = document.getElementById('locsel');
    const qEl = document.getElementById('locq');
    const picksEl = document.getElementById('picks');

    function rebuildSelect() {
      selEl.innerHTML = '';
      state.locations.forEach((loc, i) => {
        const opt = document.createElement('option');
        opt.value = String(i);
        setText(opt, loc.name);
        if (i === state.activeIdx) opt.selected = true;
        selEl.appendChild(opt);
      });
    }

    selEl.addEventListener('change', () => {
      state.activeIdx = Number(selEl.value);
      store.save(state);
      renderAll();
    });

    document.getElementById('locremove').addEventListener('click', () => {
      if (state.locations.length <= 1) {
        picksEl.innerHTML = '';
        const m = document.createElement('div'); m.className = 'msg';
        setText(m, 'Keep at least one location.'); picksEl.appendChild(m);
        return;
      }
      const list = removeLocation(state.locations, active());
      state = { v: 1, locations: list, activeIdx: 0 };
      store.save(state);
      rebuildSelect();
      renderAll();
    });

    function pickMessage(text) {
      picksEl.innerHTML = '';
      const m = document.createElement('div'); m.className = 'msg';
      setText(m, text); picksEl.appendChild(m);
    }

    async function doSearch() {
      const q = qEl.value.trim();
      if (!q) { pickMessage('Type a city name to search.'); return; }
      pickMessage('Searching…');
      let matches = [];
      try {
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);
        matches = parseGeocode(await res.json());
      } catch (e) { console.error(e); pickMessage('Search failed — try again.'); return; }
      if (!matches.length) { pickMessage('No matches.'); return; }
      picksEl.innerHTML = '';
      for (const m of matches) {
        const b = document.createElement('button');
        setText(b, m.label);
        b.addEventListener('click', () => {
          const loc = { name: m.label, lat: m.lat, lon: m.lon };
          const list = addLocation(state.locations, loc);
          const idx = list.findIndex((e) => sameLoc(e, loc));
          state = { v: 1, locations: list, activeIdx: idx >= 0 ? idx : list.length - 1 };
          store.save(state);
          rebuildSelect();
          picksEl.innerHTML = '';
          qEl.value = '';
          renderAll();
        });
        picksEl.appendChild(b);
      }
    }

    document.getElementById('locsearch').addEventListener('click', doSearch);
    qEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

    rebuildSelect();
    renderAll();
  </script>
</body>
</html>
